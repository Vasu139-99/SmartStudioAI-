<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStudio AI - Forgot Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <!-- ═══ User Nav Bar ═══ -->
    <nav class="user-nav" id="userNav">
        <div class="nav-left">
            <a href="/" class="brand-capsule">
                <img src="/static/datavidwan_logo.png" class="datavidwan-logo" alt="DataVidwan">
            </a>
        </div>
        <a href="/" class="nav-center">
            <img src="/static/smartstudio_logo.png" class="logo-img" alt="SmartStudio AI">
            <span class="nav-brand">SmartStudio <span class="highlight">AI</span></span>
        </a>
        <div class="nav-right">
            <a href="/login" class="nav-btn auth-link-btn">Login</a>
            <a href="/register" class="nav-btn auth-link-btn">Register</a>
        </div>
    </nav>

    <!-- Animated Background -->
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="auth-container">

        <!-- Forgot Password Card -->
        <div class="card glass-card auth-card">
            <h2 class="auth-title">Reset Password</h2>
            <p class="auth-subtitle" id="formSubtitle">Enter email to receive a 6-digit OTP</p>

            <!-- Step 1: Request OTP -->
            <form id="requestForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required style="margin-top: 8px;">
                </div>

                <div id="requestError" class="auth-error" style="display:none;"></div>
                <div id="requestSuccess" style="display:none; color: #10b981; font-size: 0.9rem; margin-bottom: 15px; text-align: center;"></div>

                <button type="submit" class="generate-btn auth-btn" id="requestBtn">
                    <span class="btn-text">Send OTP</span>
                    <span class="btn-loader" style="display:none;">
                        <span class="spinner"></span> Sending...
                    </span>
                </button>
            </form>

            <!-- Step 2: Verify & Reset (Hidden initially) -->
            <form id="resetForm" class="auth-form" style="display: none;">
                <div class="form-group">
                    <label for="otp">6-Digit OTP</label>
                    <input type="text" id="otp" placeholder="123456" maxlength="6" required style="margin-top: 8px; text-align: center; font-weight: bold; font-size: 1.2rem; letter-spacing: 3px;">
                </div>

                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" id="password" placeholder="••••••••" required style="margin-top: 8px;">
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" placeholder="••••••••" required style="margin-top: 8px;">
                </div>

                <div id="resetError" class="auth-error" style="display:none;"></div>

                <button type="submit" class="generate-btn auth-btn" id="resetBtn">
                    <span class="btn-text">Reset Password</span>
                    <span class="btn-loader" style="display:none;">
                        <span class="spinner"></span> Resetting...
                    </span>
                </button>
            </form>

            <p class="auth-link" style="margin-top: 20px;">
                Remembered it? <a href="/login">Back to Login</a>
            </p>
        </div>
    </div>

    <script>
        const requestForm = document.getElementById('requestForm');
        const resetForm = document.getElementById('resetForm');
        const subtitle = document.getElementById('formSubtitle');

        // State variables
        let submittedEmail = '';

        // 1. Request OTP
        requestForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('requestBtn');
            const errorDiv = document.getElementById('requestError');
            const successDiv = document.getElementById('requestSuccess');
            const btnText = btn.querySelector('.btn-text');
            const btnLoader = btn.querySelector('.btn-loader');

            const emailInput = document.getElementById('email').value.trim();

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            btnText.style.display = 'none';
            btnLoader.style.display = 'inline-flex';
            btn.disabled = true;

            try {
                const res = await fetch('/api/forgot-password/request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailInput })
                });

                const data = await res.json();

                if (res.ok) {
                    submittedEmail = emailInput;
                    successDiv.textContent = data.message;
                    successDiv.style.display = 'block';

                    // Switch view smoothly Node
                    setTimeout(() => {
                        requestForm.style.display = 'none';
                        resetForm.style.display = 'block';
                        subtitle.textContent = "Enter the 6-digit code we sent to your email";
                    }, 1500);

                } else {
                    errorDiv.textContent = data.error || 'Failed to request OTP';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Network error. Please try again.';
                errorDiv.style.display = 'block';
            }

            btnText.style.display = 'inline';
            btnLoader.style.display = 'none';
            btn.disabled = false;
        });

        // 2. Reset Password
        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('resetBtn');
            const errorDiv = document.getElementById('resetError');
            const btnText = btn.querySelector('.btn-text');
            const btnLoader = btn.querySelector('.btn-loader');

            const otp = document.getElementById('otp').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;

            errorDiv.style.display = 'none';
            btnText.style.display = 'none';
            btnLoader.style.display = 'inline-flex';
            btn.disabled = true;

            try {
                const res = await fetch('/api/forgot-password/reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: submittedEmail,
                        otp: otp,
                        password: password,
                        confirm_password: confirm
                    })
                });

                const data = await res.json();

                if (res.ok) {
                    alert("Password reset successfully! Redirecting to login page.");
                    window.location.href = '/login';
                } else {
                    errorDiv.textContent = data.error || 'Reset failed';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Network error. Please try again.';
                errorDiv.style.display = 'block';
            }

            btnText.style.display = 'inline';
            btnLoader.style.display = 'none';
            btn.disabled = false;
        });
    </script>
</body>

</html>
