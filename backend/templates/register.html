<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStudio AI - Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css?v=2">
    <style>
        /* ═══ Splash Screen ═══ */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0b14 0%, #171825 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #splash-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .splash-logo {
            width: 120px;
            height: 120px;
            object-fit: contain;
            animation: logoBounce 2.5s infinite alternate cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }

        .splash-title {
            margin-top: 20px;
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 2.5px;
            animation: textPulse 1s infinite alternate;
        }

        @keyframes logoBounce {
            0% {
                transform: translateY(0) scale(0.95);
                filter: drop-shadow(0 0 10px rgba(108, 92, 231, 0.2));
            }

            100% {
                transform: translateY(-15px) scale(1.1);
                filter: drop-shadow(0 0 25px rgba(108, 92, 231, 0.8));
            }
        }

        @keyframes textPulse {
            0% {
                opacity: 0.6;
                transform: scale(0.98);
            }

            100% {
                opacity: 1;
                transform: scale(1.02);
            }
        }
    </style>
</head>

<body>

    <!-- ═══ Splash Screen Overlay ═══ -->
    <div id="splash-screen">
        <img src="/static/smartstudio_logo.png" class="splash-logo" alt="Logo">
        <div class="splash-title">SmartStudio <span class="highlight">AI</span></div>
    </div>

    <!-- ═══ User Nav Bar ═══ -->
    <nav class="user-nav" id="userNav">
        <div class="nav-left">
            <a href="/" class="brand-capsule">
                <img src="/static/datavidwan_logo.png" class="datavidwan-logo" alt="DataVidwan">
            </a>
        </div>
        <a href="/" class="nav-center">
            <img src="/static/smartstudio_logo.png" class="logo-img" alt="SmartStudio AI">
            <span class="nav-brand">SmartStudio <span class="highlight">AI</span></span>
        </a>
        <div class="nav-right">
            <a href="/login" class="nav-btn auth-link-btn">Login</a>
            <a href="/register" class="nav-btn auth-link-btn">Register</a>
        </div>
    </nav>

    <!-- Animated Background -->
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="auth-container">

        <!-- Register Card -->
        <div class="card glass-card auth-card">
            <h2 class="auth-title">Create Account</h2>
            <p class="auth-subtitle">Join SmartStudio AI today</p>

            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="username">Full Name</label>
                    <input type="text" id="username" placeholder="John Doe" required minlength="2">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required minlength="6">
                    <span class="tip-text" style="font-size: 0.75rem; opacity: 0.6; display: block; margin-top: 4px;">At
                        least 1 uppercase, 1 lowercase, 1 number, and 1 special symbol.</span>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="••••••••" required>
                </div>

                <div id="registerError" class="auth-error" style="display:none;"></div>

                <button type="submit" class="generate-btn auth-btn" id="registerBtn">
                    <span class="btn-text">Create Account</span>
                    <span class="btn-loader" style="display:none;">
                        <span class="spinner"></span> Creating...
                    </span>
                </button>
            </form>

            <p class="auth-link">
                Already have an account? <a href="/login">Sign in</a>
            </p>
        </div>
    </div>

    <style>
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 11, 20, 0.6); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            z-index: 10000; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.4s ease;
        }
        .modal-overlay.show { opacity: 1; }
        .modal-card.wow {
            background: linear-gradient(145deg, rgba(30, 31, 45, 0.95), rgba(20, 21, 35, 0.98));
            border: 1px solid rgba(138, 92, 253, 0.4); border-radius: 24px; padding: 40px;
            max-width: 420px; width: 90%; text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            transform: scale(0.9) translateY(20px); transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal-overlay.show .modal-card.wow { transform: scale(1) translateY(0); }
        .modal-icon-wrapper {
            width: 80px; height: 80px; margin: 0 auto 20px; background: rgba(138, 92, 253, 0.1);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            border: 2px solid rgba(138, 92, 253, 0.5); box-shadow: 0 0 30px rgba(138, 92, 253, 0.3);
            animation: pulse-ring 2s infinite;
        }
        .modal-icon { width: 40px; height: 40px; color: #b59aff; }
        .modal-title {
            font-size: 1.8rem; font-weight: 800; margin-bottom: 15px;
            background: linear-gradient(to right, #b59aff, #8a5cfd, #4facfe);
            background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .modal-text { font-size: 1.05rem; color: #a1a1aa; line-height: 1.6; margin-bottom: 30px; }
        .modal-btn {
            background: linear-gradient(135deg, #8a5cfd, #4facfe); border: none; border-radius: 12px;
            padding: 16px 32px; font-size: 1.1rem; font-weight: 700; color: white; width: 100%; cursor: pointer;
            box-shadow: 0 5px 20px rgba(138, 92, 253, 0.4); position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.3s ease;
        }
        .modal-btn::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); transition: all 0.4s ease;
        }
        .modal-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(138, 92, 253, 0.6); }
        .modal-btn:hover::after { left: 100%; }
        @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(138, 92, 253, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(138, 92, 253, 0); } 100% { box-shadow: 0 0 0 0 rgba(138, 92, 253, 0); } }
    </style>
    <div id="verifyModal" class="modal-overlay">
        <div class="modal-card wow">
            <div class="modal-icon-wrapper">
                <svg class="modal-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                </svg>
            </div>
            <h3 class="modal-title">Verify Your Email</h3>
            <p id="verifyMessage" class="modal-text"></p>
            <button id="verifyActionBtn" class="modal-btn">
                <span>Verify Now</span>
                <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                </svg>
            </button>
        </div>
    </div>

    <script>
        // ── Splash Screen Timer (First Visit Only) ──
        document.addEventListener('DOMContentLoaded', () => {
            const splash = document.getElementById('splash-screen');
            if (sessionStorage.getItem('hasSeenSplash')) {
                if (splash) splash.remove(); // Skip instantly Node
                return;
            }

            setTimeout(() => {
                if (splash) {
                    splash.classList.add('fade-out');
                    setTimeout(() => splash.remove(), 800);
                }
                sessionStorage.setItem('hasSeenSplash', 'true');
            }, 3000); // 3 Seconds
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('registerBtn');
            const errorDiv = document.getElementById('registerError');
            const btnText = btn.querySelector('.btn-text');
            const btnLoader = btn.querySelector('.btn-loader');

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Password complexity validation
            const hasUpper = /[A-Z]/.test(password);
            const hasLower = /[a-z]/.test(password);
            const hasNumber = /\d/.test(password);
            const hasSpecial = /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?`~]/.test(password);

            if (!hasUpper || !hasLower || !hasNumber || !hasSpecial) {
                errorDiv.textContent = 'Password must meet complexity requirements: 1 uppercase, 1 lowercase, 1 number, and 1 special symbol.';
                errorDiv.style.display = 'block';
                return;
            }

            if (password !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.style.display = 'block';
                return;
            }

            errorDiv.style.display = 'none';
            btnText.style.display = 'none';
            btnLoader.style.display = 'inline-flex';
            btn.disabled = true;

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        email: document.getElementById('email').value,
                        password: password,
                        confirm_password: confirmPassword
                    })
                });

                const data = await res.json();

                if (res.ok) {
                    const emailInput = document.getElementById('email').value;
                    let mailUrl = 'https://mail.google.com';
                    const lowerEmail = emailInput.toLowerCase();
                    if (lowerEmail.includes('@yahoo.com') || lowerEmail.includes('@ymail.com')) {
                        mailUrl = 'https://mail.yahoo.com/';
                    } else if (lowerEmail.includes('@outlook.com') || lowerEmail.includes('@hotmail.com') || lowerEmail.includes('@live.com')) {
                        mailUrl = 'https://outlook.live.com/';
                    }

                    const modal = document.getElementById('verifyModal');
                    document.getElementById('verifyMessage').textContent = 'A verification email has been sent to ' + emailInput + '. Please verify your account.';
                    
                    document.getElementById('verifyActionBtn').onclick = function() {
                        window.open(mailUrl, '_blank');
                        window.location.href = '/login';
                    };
                    
                    modal.style.display = 'flex';
                    // Trigger reflow for animation
                    void modal.offsetWidth;
                    modal.classList.add('show');

                    // Reset button state but keep disabled to prevent double submit
                    btnText.style.display = 'inline';
                    btnLoader.style.display = 'none';
                } else {
                    errorDiv.textContent = data.error || 'Registration failed';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Network error. Please try again.';
                errorDiv.style.display = 'block';
            }

            btnText.style.display = 'inline';
            btnLoader.style.display = 'none';
            btn.disabled = false;
        });
    </script>
</body>

</html>
