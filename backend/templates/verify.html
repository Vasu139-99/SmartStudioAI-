<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStudio AI - Verification</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
    </div>

    <div class="auth-container" style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
        <div class="card glass-card auth-card" style="text-align: center; max-width: 400px; padding: 40px;">
            <h2 class="auth-title" style="margin-bottom: 20px;">Email Verification</h2>
            
            {% if success %}
                <div class="success-icon" style="font-size: 3rem; margin-bottom: 20px;">✅</div>
                <p class="auth-subtitle" style="margin-bottom: 10px;">Verification Successful!</p>
                <p style="margin: 20px 0; opacity: 0.8; font-size: 0.95rem;">Your email has been verified. You can now log in and start creating amazing AI videos.</p>
                <a href="/login" class="generate-btn auth-btn" style="text-decoration: none; display: inline-block; width: 100%; margin-top: 10px;">Go to Login</a>
            {% else %}
                <div class="error-icon" style="font-size: 3rem; margin-bottom: 20px;">❌</div>
                <p class="auth-subtitle" style="color: #ef4444; margin-bottom: 10px;">Verification Failed</p>
                <p style="margin: 20px 0; opacity: 0.8; font-size: 0.95rem;">{{ error }}</p>
                <a href="/register" class="auth-link" style="color: #38bdf8; text-decoration: none; font-size: 0.9rem;">Back to Registration</a>
            {% endif %}
        </div>
    </div>
</body>
</html>
